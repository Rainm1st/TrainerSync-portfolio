<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TrainerSync Project Architecture</title>
  <desc id="desc">A high-level architecture diagram showing trainee, coach, shared app logic, hosted web app, and data feedback loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10275f"/>
      <stop offset="0.55" stop-color="#2457d6"/>
      <stop offset="1" stop-color="#16a085"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#06122e" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#19b8a6"/>
    </marker>
    <style>
      .title{font:800 54px Segoe UI,Arial,sans-serif;fill:#fff;letter-spacing:-1.6px}
      .subtitle{font:500 24px Segoe UI,Arial,sans-serif;fill:#dce8ff}
      .label{font:800 26px Segoe UI,Arial,sans-serif;fill:#10213f}
      .small{font:500 18px Segoe UI,Arial,sans-serif;fill:#50617f}
      .micro{font:700 15px Segoe UI,Arial,sans-serif;fill:#2351c4;text-transform:uppercase;letter-spacing:1.4px}
      .pill{font:800 17px Segoe UI,Arial,sans-serif;fill:#ffffff}
      .line{stroke:#19b8a6;stroke-width:8;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
      .line2{stroke:#f28a44;stroke-width:6;stroke-linecap:round;fill:none;stroke-dasharray:14 12;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1600" height="900" rx="46" fill="url(#bg)"/>
  <circle cx="1380" cy="120" r="210" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="780" r="260" fill="#ffffff" opacity="0.06"/>

  <text x="90" y="110" class="title">TrainerSync Project Architecture</text>
  <text x="92" y="152" class="subtitle">A shared coach-trainee loop for safer, clearer, and more playful gym training.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="240" width="360" height="220" rx="34" fill="url(#card)"/>
    <text x="116" y="286" class="micro">Primary User</text>
    <text x="116" y="330" class="label">Trainee Interface</text>
    <text x="116" y="370" class="small">Workout selection, live guidance,</text>
    <text x="116" y="400" class="small">heart-rate cues, companion support,</text>
    <text x="116" y="430" class="small">and post-session recap.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="205" width="360" height="290" rx="34" fill="url(#card)"/>
    <text x="656" y="252" class="micro">Hosted Web App</text>
    <text x="656" y="296" class="label">Shared App Logic</text>
    <text x="656" y="338" class="small">Routes, session state, progress rules,</text>
    <text x="656" y="368" class="small">training events, mock telemetry,</text>
    <text x="656" y="398" class="small">and coach-trainee message flow.</text>
    <rect x="656" y="430" width="285" height="38" rx="19" fill="#2457d6"/>
    <text x="682" y="456" class="pill">GitHub Pages Deployment</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1160" y="240" width="360" height="220" rx="34" fill="url(#card)"/>
    <text x="1196" y="286" class="micro">Secondary User</text>
    <text x="1196" y="330" class="label">Coach Dashboard</text>
    <text x="1196" y="370" class="small">Multi-trainee overview, priority alerts,</text>
    <text x="1196" y="400" class="small">training strategy dispatch, messages,</text>
    <text x="1196" y="430" class="small">and session history review.</text>
  </g>

  <path d="M445 348 C510 310, 555 292, 615 310" class="line"/>
  <path d="M985 310 C1044 292, 1093 310, 1154 348" class="line"/>
  <path d="M1160 418 C1010 585, 605 585, 440 418" class="line2"/>

  <g filter="url(#shadow)">
    <rect x="230" y="610" width="1140" height="160" rx="34" fill="#ffffff" opacity="0.96"/>
    <text x="275" y="660" class="micro">Human-Centered Feedback Loop</text>
    <text x="275" y="705" class="small">1. Trainee starts a session and receives live cues.</text>
    <text x="275" y="735" class="small">2. Shared logic turns session events into progress, warnings, and recap data.</text>
    <text x="820" y="705" class="small">3. Coach sees who needs help first.</text>
    <text x="820" y="735" class="small">4. Guidance returns to the trainee as lightweight intervention.</text>
  </g>
</svg>

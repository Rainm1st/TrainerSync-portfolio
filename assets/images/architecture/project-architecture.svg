<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">TrainerSync Project Architecture</title>
  <desc id="desc">A layered project architecture diagram for TrainerSync showing trainee app, coach app, hosted web application, feature modules, and feedback loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f224d"/>
      <stop offset="0.56" stop-color="#2354c9"/>
      <stop offset="1" stop-color="#18a493"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f6ff"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#06122e" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#17b8a4"/>
    </marker>
    <style>
      .title{font:800 56px Segoe UI,Arial,sans-serif;fill:#fff;letter-spacing:-1.5px}
      .subtitle{font:500 24px Segoe UI,Arial,sans-serif;fill:#e4ecff}
      .layer{font:800 18px Segoe UI,Arial,sans-serif;fill:#2250c4;letter-spacing:1.2px;text-transform:uppercase}
      .head{font:800 29px Segoe UI,Arial,sans-serif;fill:#10213f}
      .body{font:500 19px Segoe UI,Arial,sans-serif;fill:#4d5c79}
      .small{font:700 17px Segoe UI,Arial,sans-serif;fill:#ffffff}
      .pillText{font:800 16px Segoe UI,Arial,sans-serif;fill:#18408f}
      .line{stroke:#17b8a4;stroke-width:7;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
      .lineSoft{stroke:#f18443;stroke-width:6;stroke-linecap:round;fill:none;stroke-dasharray:14 12;marker-end:url(#arrow)}
      .divider{stroke:#dbe5f4;stroke-width:2}
    </style>
  </defs>

  <rect width="1800" height="1050" rx="48" fill="url(#bg)"/>
  <circle cx="1540" cy="150" r="250" fill="#fff" opacity="0.08"/>
  <circle cx="190" cy="920" r="280" fill="#fff" opacity="0.06"/>

  <text x="90" y="115" class="title">TrainerSync Project Architecture</text>
  <text x="92" y="158" class="subtitle">A shared web application linking exercise discovery, live monitoring, location interaction, and coach oversight.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="230" width="410" height="250" rx="34" fill="url(#panel)"/>
    <text x="130" y="278" class="layer">Trainee Side</text>
    <text x="130" y="323" class="head">Mobile Training App</text>
    <text x="130" y="365" class="body">Browse exercises by muscle</text>
    <text x="130" y="395" class="body">group and equipment type.</text>
    <text x="130" y="433" class="body">View images or GIFs for</text>
    <text x="130" y="463" class="body">movement trajectory.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="695" y="205" width="410" height="300" rx="34" fill="url(#panel)"/>
    <text x="735" y="253" class="layer">Hosted System</text>
    <text x="735" y="298" class="head">GitHub Pages Web App</text>
    <line x1="735" y1="325" x2="1065" y2="325" class="divider"/>
    <text x="735" y="365" class="body">Client-side routing and UI state.</text>
    <text x="735" y="397" class="body">Exercise filtering rules.</text>
    <text x="735" y="429" class="body">Live session telemetry panel.</text>
    <text x="735" y="461" class="body">Map, emoji, and binding logic.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1300" y="230" width="410" height="250" rx="34" fill="url(#panel)"/>
    <text x="1340" y="278" class="layer">Coach Side</text>
    <text x="1340" y="323" class="head">Remote Dashboard</text>
    <text x="1340" y="365" class="body">Monitor bound trainees across</text>
    <text x="1340" y="395" class="body">physical distance.</text>
    <text x="1340" y="433" class="body">Read heart rate, sets, progress,</text>
    <text x="1340" y="463" class="body">and send guidance.</text>
  </g>

  <path d="M505 350 C590 315, 625 310, 685 335" class="line"/>
  <path d="M1115 335 C1175 310, 1210 315, 1295 350" class="line"/>
  <path d="M1295 432 C1110 650, 690 650, 505 432" class="lineSoft"/>

  <g filter="url(#shadow)">
    <rect x="145" y="610" width="1510" height="255" rx="36" fill="#ffffff" opacity="0.97"/>
    <text x="190" y="663" class="layer">Core Feature Modules</text>

    <g>
      <rect x="190" y="700" width="430" height="115" rx="24" fill="#eef4ff"/>
      <text x="220" y="737" class="pillText">1. Smart Exercise Discovery</text>
      <text x="220" y="770" class="body">Filter by muscle and equipment,</text>
      <text x="220" y="800" class="body">then learn from image or GIF demos.</text>
    </g>

    <g>
      <rect x="685" y="700" width="430" height="115" rx="24" fill="#ecfaf7"/>
      <text x="715" y="737" class="pillText">2. Live Data and Intervention</text>
      <text x="715" y="770" class="body">Track heart rate, sets, and progress,</text>
      <text x="715" y="800" class="body">then trigger breathing guidance.</text>
    </g>

    <g>
      <rect x="1180" y="700" width="430" height="115" rx="24" fill="#fff3eb"/>
      <text x="1210" y="737" class="pillText">3. Location and Coach Oversight</text>
      <text x="1210" y="770" class="body">Find nearby coaches or buddies,</text>
      <text x="1210" y="800" class="body">send emoji, and enable remote monitoring.</text>
    </g>
  </g>

  <g>
    <rect x="615" y="910" width="570" height="54" rx="27" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.24)"/>
    <text x="665" y="945" class="small">Trainee action data forms a feedback loop for coach guidance and safer training.</text>
  </g>
</svg>
